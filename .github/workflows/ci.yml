# GitHub Actions Workflow: Full CI/CD Lifecycle (v1.4-production)
# ---------------------------------------------------------------
# 1. CI (Continuous Integration):
#    - Backend: Python 3.13, Django 6.0, Ruff (Lint/Format), Pytest + Coverage.
#    - Frontend: Node 20, React 19, ESLint, Vitest, Vite Build Check.
# 2. CD (Continuous Deployment):
#    - Автоматическое развертывание на сервер Reg.ru через SSH.
#    - Обновление контейнеров Docker & конфигурации Traefik.

name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  # --- BACKEND: Проверка Python/Django инфраструктуры ---
  backend-ci:
    name: Backend Quality Check
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: cloud_db
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "backend/pyproject.toml"

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Lint & Style Check (Ruff)
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Run Pytest with Coverage
        env:
          DATABASE_URL: postgres://user:password@localhost:5432/cloud_db
          BASE_REDIS_URL: redis://localhost:6379
          SECRET_KEY: ci-test-key-123
          DEBUG: "False"
        run: |
          uv run pytest --cov=storage --cov=users --cov=core --cov-report=xml --cov-branch

  # --- FRONTEND: Проверка React/TypeScript инфраструктуры ---
  frontend-ci:
    name: Frontend Quality Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Check Code Style (Prettier)
        run: yarn format:check

      - name: Lint Logic (ESLint)
        run: yarn lint

      - name: Run Tests (Vitest)
        run: yarn test:run

      - name: Build Check (Vite)
        run: yarn build

  # --- DEPLOY: Автоматический деплой на сервер Reg.ru ---
  deploy:
    name: Deploy to Production
    needs: [backend-ci, frontend-ci]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Execute remote ssh commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/mycloud-django-react
            git fetch origin main
            git reset --hard origin/main
            docker compose up -d --build
            docker system prune -f
