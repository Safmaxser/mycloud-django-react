server {
    listen 80;
    server_name localhost;

    server_tokens off;

    # Настройка реального IP
    set_real_ip_from  172.16.0.0/12;
    real_ip_header    X-Forwarded-For;
    real_ip_recursive on;

    client_max_body_size 512M;
    client_body_timeout 300s;
    client_header_timeout 300s;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_hide_header X-Powered-By;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Проксирование WebSocket-соединений (Django Channels / Daphne)
    location /ws/ {
        proxy_pass http://backend:8000;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Стандартные таймауты для WS (поддержка живого соединения)
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location /admin/ {
        proxy_pass http://backend:8000;
        proxy_intercept_errors on;
        error_page 404 = @go_to_react;
    }

    # Редирект некорректных путей админ-панели в React SPA
    location @go_to_react {
        root /usr/share/nginx/html;
        try_files /index.html =404;
    }

    # Внутренняя локация для безопасной отдачи файлов (X-Accel-Redirect)
    location /protected_files/ {
        internal;
        alias /usr/share/nginx/html/protected/;
        add_header X-Content-Type-Options nosniff;
    }
}
